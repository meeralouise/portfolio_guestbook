<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Guest Book</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<main>

  <section class="intro">
    <h1>my website guestbook</h1>
    <p>
      please leave me a note or loveletter xxx 
    </p>
  </section>

  <section class="form">
    <form id="guestForm">

      <textarea
        name="message"
        placeholder="hihihihi"
        required
      ></textarea>

      <details>
        <summary>Add your name (optional)</summary>
        <input type="text" name="name" placeholder="Name" />
        <input type="email" name="email" placeholder="Email" />
      </details>

      <button type="submit">Submit</button>

      <p class="note">
        Messages are public. Name and email are optional.
      </p>

    </form>
  </section>

  <section class="messages">
    <h2>Comments</h2>
    <div id="messages"></div>
  </section>

</main>

<script src="script.js"></script>
</body>
</html>
